name: ratelimiter

services:
  redis:
    image: redis:7-alpine
    container_name: rl-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  gateway:
    build:
      context: ./gateway
    image: ratelimiter-gateway:latest
    # No container_name and no host port mapping — multiple replicas. Caddy
    # is the user-facing entry point; clients always go through it.
    deploy:
      replicas: 3
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RL_CAPACITY=10
      - RL_REFILL_PER_SEC=1.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=1).status==200 else 1)"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
    depends_on:
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    container_name: rl-caddy
    ports:
      - "${GATEWAY_PORT:-18000}:8000"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: rl-prometheus
    ports:
      - "${PROM_PORT:-19090}:9090"
    volumes:
      - ../../shared/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.listen-address=:9090
      - --storage.tsdb.retention.time=1h
    depends_on:
      gateway:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.2
    container_name: rl-grafana
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../../shared/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  k6:
    image: grafana/k6:0.53.0
    container_name: rl-k6
    profiles: ["test"]
    environment:
      # k6 talks to Caddy (the LB) — same as a real client would.
      - GATEWAY_URL=http://caddy:8000
    volumes:
      - ./k6:/scripts:ro
    entrypoint: ["k6"]
