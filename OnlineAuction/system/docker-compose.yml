name: auction

services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: auc-dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "${DDB_PORT:-18002}:8000"
    # No healthcheck (image lacks curl/wget). The api lifespan retries
    # connection in ddb.ensure_tables(), so api waits for DDB to be reachable.

  api:
    build:
      context: ./api
    image: auction-api:latest
    deploy:
      replicas: 3
    environment:
      - DDB_ENDPOINT=http://dynamodb-local:8000
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      dynamodb-local:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=1).status==200 else 1)"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  caddy:
    image: caddy:2.8-alpine
    container_name: auc-caddy
    ports:
      - "${API_PORT:-18001}:8000"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: auc-prometheus
    ports:
      - "${PROM_PORT:-19091}:9090"
    volumes:
      - ../shared/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.listen-address=:9090
      - --storage.tsdb.retention.time=1h
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.2
    container_name: auc-grafana
    ports:
      - "${GRAFANA_PORT:-13001}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../shared/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  k6:
    image: grafana/k6:0.53.0
    container_name: auc-k6
    profiles: ["test"]
    environment:
      - API_URL=http://caddy:8000
    volumes:
      - ./k6:/scripts:ro
    entrypoint: ["k6"]
