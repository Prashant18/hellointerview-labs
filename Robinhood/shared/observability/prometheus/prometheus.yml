global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    dns_sd_configs:
      - names: [api]
        type: A
        port: 8000
        refresh_interval: 5s
  - job_name: mock-exchange
    metrics_path: /metrics
    dns_sd_configs:
      - names: [mock-exchange]
        type: A
        port: 8000
        refresh_interval: 5s
